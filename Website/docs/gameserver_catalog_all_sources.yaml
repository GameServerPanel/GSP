games:
- game_id: cod4
  name: 'Call of Duty 4: Modern Warfare'
  engine: id Tech 3 derivative
  lgsm_slug: null
  dedicated_binary: null
  typical_startup:
    linux: wine cod4x18_dedrun.exe +set dedicated 2 +set net_port 28960 +set fs_game
      mods/<mod> +exec server.cfg
    windows: iw3mp.exe +set dedicated 2 +set net_port 28960 +set fs_game mods/<mod>
      +exec server.cfg
  network:
    default_ports:
    - port: 28960/udp
      purpose: Game/Query
    additional_ports:
    - port: 20800/udp
      purpose: Legacy query (varies)
  files:
    configs:
    - <install>/main/server.cfg
    - <install>/mods/<mod>/server.cfg
    logs:
    - <install>/main/games_mp.log
    mods_dir: <install>/mods/
  mod_support:
    official_workshop: 'no'
    how_to:
    - Use +set fs_game mods/<modname> and configure HTTP redirect for assets.
    notable_tools:
    - CoD4x
    - ModernRcon
    - B3 (legacy)
  requirements:
    os: Windows; Linux via Wine
    cpu: Single‑threaded; high clock
    ram: ≈1 GB
    storage: ≈8–20 GB
    dependencies:
    - DirectX/VC runtimes
    - Router/NAT port forward
  troubleshooting:
    common_issues:
    - issue: Server not visible
      fix: Forward UDP 28960; check firewall; try alternate port; verify net_ip/net_port
        DVARS
  references:
  - https://cod4x.ovh/t/how-to-create-a-server-windows-guide/3095
  - https://kb.firedaemon.com/support/solutions/articles/4000086725-call-of-duty-4-modern-warfare-as-a-service
  - https://support.activision.com/articles/ports-used-for-call-of-duty-games
