  mod_support:
    official_workshop: 'no'
    how_to:
    - +set fs_game <mod>; configure Omni-bot if needed.
    notable_tools:
    - 'ET: Legacy'
    - etpro
    - jaymod
    - Omni-bot
  requirements:
    os: Windows or Linux
    cpu: Any modern CPU
    ram: 512 MB–1 GB
    storage: 2–5 GB
    dependencies:
    - Open UDP 27960 (increment for more instances)
  troubleshooting:
    common_issues:
    - issue: Not in Internet list
      fix: Forward UDP 27960; set dedicated 2; check master reachability.
  references:
  - https://wolffiles.de/filebase/ET/Stuff/ET-Serverguide.pdf
- game_id: dods
  name: 'Day of Defeat: Source'
  engine: Source / SRCDS
  lgsm_slug: null
  dedicated_binary: null
  typical_startup:
    linux: ./srcds_run -console -game dod -ip 0.0.0.0 -port 27015 +map dod_kalt +maxplayers
      24 +exec server.cfg
    windows: srcds.exe -console -game dod -ip 0.0.0.0 -port 27015 +map dod_kalt +maxplayers
      24 +exec server.cfg
  network:
    default_ports: &id001
    - port: 27015/udp
      purpose: Game/Query
    - port: 27015/tcp
      purpose: RCON
    - port: 27020/udp
      purpose: SourceTV
    - port: 27005/udp
      purpose: Client ephemeral (outbound)
    additional_ports: &id002
    - port: 26900/udp
      purpose: Steam (outbound)
    - port: 27031-27036/udp
      purpose: Steam P2P/Remote Play
    - port: 27036-27037/tcp
      purpose: Steam Remote Play
  files: &id003
    configs:
    - <gamedir>/cfg/server.cfg
    - <gamedir>/cfg/autoexec.cfg
    logs:
    - <gamedir>/logs/  (sv_logsdir; set sv_log_onefile 1 to consolidate)
    mods_dir: <gamedir>/addons/ (Metamod:Source / SourceMod)
  mod_support:
    official_workshop: varies
    how_to: &id004
    - 'For Workshop maps: add -authkey <SteamWebAPIKey> and +host_workshop_collection
      <collection_id>.'
    - Alternatively, host FastDL and set sv_downloadurl.
    notable_tools:
    - Metamod:Source
    - SourceMod
  requirements: &id005
    os: Windows Server 2016+ or modern 64‑bit Linux (glibc ≥ 2.27)
    cpu: High single-core performance benefits tickrate
    ram: 2–4 GB per server as a baseline (varies by game/players)
    storage: 10–30 GB typical
    dependencies:
    - SteamCMD
    - Open firewall for listed ports
  troubleshooting:
    common_issues:
    - issue: Server not listed
      fix: Open 27015/udp & 27015/tcp; sv_lan 0; verify external firewall/NAT.
    - issue: Workshop maps not downloading
      fix: Set -authkey; +host_workshop_collection; network egress allowed.
  references:
  - https://developer.valvesoftware.com/wiki/Source_Dedicated_Server
