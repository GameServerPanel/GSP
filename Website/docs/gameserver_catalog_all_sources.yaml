- game_id: bf1942
  name: Battlefield 1942
  engine: Refractor 2
  lgsm_slug: null
  dedicated_binary: null
  typical_startup:
    linux: wine BF1942_w32ded.exe +dedicated 1
    windows: BF1942_w32ded.exe +dedicated 1
  network:
    default_ports:
    - port: 14567/udp
      purpose: Game
    - port: 23000/udp
      purpose: GameSpy/Server query
    additional_ports: []
  files:
    configs:
    - Mods/bf1942/Settings/ServerSettings.con
    - maplist.con
    logs:
    - Mods/bf1942/Logs/
    mods_dir: Mods/
  mod_support:
    official_workshop: 'no'
    how_to:
    - Install mods under Mods/<mod>; select in ServerSettings.con; modify maplist.con.
    notable_tools:
    - BFServerManager (legacy)
  requirements:
    os: Windows (native server); Linux possible via Wine
    cpu: Any modern CPU
    ram: 512 MB–1 GB
    storage: 2–5 GB
    dependencies:
    - Forward UDP 14567 + 23000
  troubleshooting:
    common_issues:
    - issue: Not listed
      fix: Open 23000/udp; ensure 1.612 server version.
  references:
  - https://team-simple.org/forum/viewtopic.php?id=109
- game_id: etlegacy
  name: 'Wolfenstein: Enemy Territory / ET: Legacy'
  engine: id Tech 3
  lgsm_slug: null
  dedicated_binary: null
  typical_startup:
    linux: ./etlded +set dedicated 2 +set net_port 27960 +set fs_game legacy +exec
      server.cfg
    windows: et.exe +set dedicated 2 +set net_port 27960 +set fs_game legacy +exec
